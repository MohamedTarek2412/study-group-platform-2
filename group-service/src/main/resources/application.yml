server:
  port: 8083

spring:
  application:
    name: group-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/group_db}
    username: ${SPRING_DATASOURCE_USERNAME:group_user}
    password: ${SPRING_DATASOURCE_PASSWORD:group_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: group-service
      auto-offset-reset: earliest

logging:
  level:
    com.studygroup.group: DEBUG
