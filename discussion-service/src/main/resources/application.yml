server:
  port: 8084

spring:
  application:
    name: discussion-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/discussion_db}
    username: ${SPRING_DATASOURCE_USERNAME:disc_user}
    password: ${SPRING_DATASOURCE_PASSWORD:disc_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: discussion-service
      auto-offset-reset: earliest

logging:
  level:
    com.studygroup.discussion: DEBUG
