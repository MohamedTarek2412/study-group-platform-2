services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [studygroup-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  auth-db:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    volumes: 
      - auth-data:/var/lib/postgresql/data
      - ./auth-service/src/main/resources/01-create-user.sql:/docker-entrypoint-initdb.d/01-create-user.sql
      - ./auth-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    volumes: 
      - user-data:/var/lib/postgresql/data
      - ./user-service/src/main/resources/01-create-user.sql:/docker-entrypoint-initdb.d/01-create-user.sql
      - ./user-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  group-db:
    image: postgres:16
    environment:
      POSTGRES_DB: group_db
      POSTGRES_USER: group_user
      POSTGRES_PASSWORD: group_pass
    volumes: 
      - group-data:/var/lib/postgresql/data
      - ./group-service/src/main/resources/01-create-user.sql:/docker-entrypoint-initdb.d/01-create-user.sql
      - ./group-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U group_user -d group_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  discussion-db:
    image: postgres:16
    environment:
      POSTGRES_DB: discussion_db
      POSTGRES_USER: disc_user
      POSTGRES_PASSWORD: disc_pass
    volumes: 
      - discussion-data:/var/lib/postgresql/data
      - ./discussion-service/src/main/resources/01-create-user.sql:/docker-entrypoint-initdb.d/01-create-user.sql
      - ./discussion-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disc_user -d discussion_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./api-gateway
    ports: ["8080:8080"]
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      group-service:
        condition: service_healthy
      discussion-service:
        condition: service_healthy
    environment:
      GATEWAY_AUTH_URI: http://auth-service:8081
      GATEWAY_USER_URI: http://user-service:8082
      GATEWAY_GROUP_URI: http://group-service:8083
      GATEWAY_DISCUSSION_URI: http://discussion-service:8084
      JWT_SECRET: ${JWT_SECRET:-study-group-platform-dev-jwt-secret-change-me-in-production-min-32-chars}
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  auth-service:
    build: ./auth-service
    depends_on:
      auth-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-study-group-platform-dev-jwt-secret-change-me-in-production-min-32-chars}
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  user-service:
    build: ./user-service
    depends_on:
      user-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: user_user
      SPRING_DATASOURCE_PASSWORD: user_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8082/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  group-service:
    build: ./group-service
    depends_on:
      group-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://group-db:5432/group_db
      SPRING_DATASOURCE_USERNAME: group_user
      SPRING_DATASOURCE_PASSWORD: group_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8083/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  discussion-service:
    build: ./discussion-service
    depends_on:
      discussion-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://discussion-db:5432/discussion_db
      SPRING_DATASOURCE_USERNAME: disc_user
      SPRING_DATASOURCE_PASSWORD: disc_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks: [studygroup-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8084/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      REACT_APP_API_URL: http://localhost:8080
    networks: [studygroup-net]

networks:
  studygroup-net:
    driver: bridge

volumes:
  auth-data:
  user-data:
  group-data:
  discussion-data:
